name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: pytest (provider unit tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lightweight test deps
        # Skip torch / heavy ML deps — the provider tests are fully mocked
        # against runpod / paramiko / huggingface-hub and don't need a GPU stack.
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio python-dotenv \
                      runpod paramiko huggingface-hub pydantic fastapi

      - name: Run provider tests
        working-directory: backend
        run: pytest tests/providers -v --tb=short
