version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - BLOCKQUANT_API_URL=http://api:8000
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend/src:/app/src
      - blockquant-work:/tmp/blockquant-work

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A scheduler.tasks worker --loglevel=info
    volumes:
      - ./backend/src:/app/src
      - blockquant-work:/tmp/blockquant-work

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - BLOCKQUANT_API_URL=http://api:8000
    depends_on:
      - api
      - worker
    command: npm run start
    volumes:
      - ./src:/app/src
      - ./data:/app/data

volumes:
  redis-data:
  blockquant-work:
